name: Security Pipeline

on:
  pull_request:
    branches: [test]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-review:
    name: Security Review (ML Model)
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.predict.outputs.verdict }}
      proba: ${{ steps.predict.outputs.proba }}
      summary: ${{ steps.predict.outputs.summary }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install ML dependencies
        run: pip install -r ml/requirements.txt

      - name: Print env versions
        run: |
          echo "Python: $(python --version)"
          echo "scikit-learn: $(python -c 'import sklearn; print(sklearn.__version__)')"
          echo "xgboost: $(python -c 'import xgboost; print(xgboost.__version__)')"
          echo "numpy: $(python -c 'import numpy; print(numpy.__version__)')"
          echo "joblib: $(python -c 'import joblib; print(joblib.__version__)')"

      - name: Generate diff
        id: diff
        run: |
          set -e
          git fetch origin test --depth=1 || git fetch origin test
          if [ ! -d "app" ]; then
            echo "::notice::app/ no existe en esta rama. Se omite el análisis de seguridad."
            > pr.diff
            echo "diff_lines=0" >> "$GITHUB_OUTPUT"
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff origin/test...HEAD -- 'app/**/*.py' ':!app/tests/**/*.py' > pr.diff
          GIT_DIFF_EXIT=$?
          echo "git_diff_exit_code=$GIT_DIFF_EXIT"
          if [ "$GIT_DIFF_EXIT" -ne 0 ]; then
            echo "::warning::git diff returned non-zero: $GIT_DIFF_EXIT"
          fi
          LINES=$(wc -l < pr.diff | tr -d ' ')
          echo "diff_lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "Files in diff:"
          grep '^diff --git' pr.diff || echo "(no diff headers found)"
          if [ "$LINES" = "0" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "No Python files changed. Skipping model."
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
            echo "Diff size: $LINES lines"
          fi

      - name: Run ML model
        id: predict
        if: steps.diff.outputs.skip == '0'
        run: |
          set -o pipefail
          # Desactivar errexit para que el exit code 2 de Python no mate el script
          set +e
          python -W ignore -m ml.predict --diff pr.diff > result.json
          EXIT_CODE=$?
          set -e
          echo "predict_exit_code=$EXIT_CODE"
          cat result.json
          if [ ! -s result.json ]; then
            echo "::error::result.json is empty"
            exit 1
          fi
          VERDICT=$(jq -r '.overall.label // "UNKNOWN"' result.json)
          PROBA=$(jq -r '.overall.proba // 0' result.json)
          SUMMARY=$(jq -r '.summary // "no summary"' result.json)
          {
            echo "verdict=$VERDICT"
            echo "proba=$PROBA"
            echo "summary=$SUMMARY"
          } >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" = "2" ]; then
            echo "::error::Model classified code as VULNERABLE (exit code 2). This is expected behavior — see result.json for details."
          fi

      - name: Comment on PR
        if: steps.diff.outputs.skip == '0'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ml-security-review
          message: |
            ## Resultado del modelo de seguridad

            | Campo | Valor |
            |-------|-------|
            | **Veredicto** | ${{ steps.predict.outputs.verdict }} |
            | **Probabilidad** | ${{ steps.predict.outputs.proba }} |
            | **Resumen** | ${{ steps.predict.outputs.summary }} |

            ---
            _Generado por `ml/predict.py` (XGBoost + TF-IDF + AST + patrones)_

      - name: Add label
        if: steps.diff.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.predict.outputs.verdict }}" = "VULNERABLE" ]; then
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "fixing-required" --remove-label "security-approved" || true
          else
            gh pr edit "${{ github.event.pull_request.number }}" --add-label "security-approved" --remove-label "fixing-required" || true
          fi

      - name: Create issue if vulnerable
        if: steps.predict.outputs.verdict == 'VULNERABLE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="El modelo de seguridad detectó código vulnerable en PR #${{ github.event.pull_request.number }}."
          BODY+=$'\n\n- **Probabilidad:** ${{ steps.predict.outputs.proba }}'
          BODY+=$'\n- **Resumen:** ${{ steps.predict.outputs.summary }}'
          BODY+=$'\n\nVer PR: ${{ github.event.pull_request.html_url }}'
          gh issue create \
            --title "fixing-required: PR #${{ github.event.pull_request.number }} contiene código vulnerable" \
            --body "$BODY" \
            --label "fixing-required,security" || echo "issue-create-failed"

      - name: Notify Telegram - start
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          MSG="🔍 Revisión de seguridad iniciada: PR #${{ github.event.pull_request.number }} (${{ github.event.pull_request.title }})"
          python -m scripts.telegram_notify "$MSG" || true

      - name: Debug result.json
        if: always() && steps.diff.outputs.skip == '0'
        run: |
          echo "=== result.json ==="
          cat result.json || echo "result.json no existe"
          echo "=== predict outputs ==="
          echo "verdict=${{ steps.predict.outputs.verdict }}"
          echo "proba=${{ steps.predict.outputs.proba }}"
          echo "summary=${{ steps.predict.outputs.summary }}"

      - name: Notify Telegram - result
        if: always() && steps.diff.outputs.skip == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          VERDICT="${{ steps.predict.outputs.verdict }}"
          PROBA="${{ steps.predict.outputs.proba }}"
          SUMMARY="${{ steps.predict.outputs.summary }}"
          if [ "$VERDICT" = "VULNERABLE" ]; then
            # Extraer archivos vulnerables del result.json
            VULN_FILES=$(jq -r '.files[] | select(.label == "VULNERABLE") | "\(.path) (\(.proba))"' result.json | head -n 10)
            MSG="PR #${{ github.event.pull_request.number }} RECHAZADO (probabilidad $PROBA): $SUMMARY"
            MSG="$MSG

Archivos vulnerables:"
            while IFS= read -r line; do
              MSG="$MSG
- $line"
            done <<< "$VULN_FILES"
          else
            MSG="PR #${{ github.event.pull_request.number }} APROBADO (probabilidad $PROBA): $SUMMARY"
          fi
          echo "Enviando mensaje de resultado..."
          python -m scripts.telegram_notify "$MSG" || echo "telegram-result-failed"

      - name: Notify Telegram - vulnerable details
        if: always() && steps.diff.outputs.skip == '0' && steps.predict.outputs.verdict == 'VULNERABLE'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          jq -r '.files[] | select(.label == "VULNERABLE") | "📄 Archivo: \(.path)\n   Probabilidad: \(.proba)\n   Top features (LIME):\n\(.lime_explanation // [] | .[:5] | to_entries[] | "     \(.key + 1). \(.value.token) (peso: \(.value.weight))")"' result.json > vuln_details.txt || echo "jq-failed"
          MSG="⚠️ DETALLES DE VULNERABILIDAD
PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}
${{ github.event.pull_request.html_url }}

$(cat vuln_details.txt)"
          # Truncar si es muy largo
          if [ ${#MSG} -gt 4000 ]; then
            MSG="${MSG:0:4000}... (mensaje truncado)"
          fi
          echo "Enviando detalles de vulnerabilidad..."
          echo "$MSG" | python -m scripts.telegram_notify || echo "telegram-details-failed"

      - name: Fail if vulnerable
        if: steps.predict.outputs.verdict == 'VULNERABLE'
        run: |
          echo "::error::El modelo detectó código VULNERABLE (probabilidad ${{ steps.predict.outputs.proba }}). Merge bloqueado."
          exit 1

  test-and-merge:
    name: Tests + Auto-Merge to Test
    needs: security-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Check if app exists
        id: check_app
        run: |
          if [ -d "app" ] && [ -f "app/requirements.txt" ]; then
            echo "app_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::app/ no existe en esta rama. Se omiten tests de aplicación."
            echo "app_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install app dependencies
        if: steps.check_app.outputs.app_exists == 'true'
        run: pip install -r app/requirements.txt

      - name: Run tests
        if: steps.check_app.outputs.app_exists == 'true'
        run: cd app && pytest

      - name: Notify Telegram - tests passed
        if: success() && steps.check_app.outputs.app_exists == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          MSG="Tests OK + auto-merge a test programado para PR #${{ github.event.pull_request.number }}"
          python -m scripts.telegram_notify "$MSG" || true

      - name: Notify Telegram - tests failed
        if: failure() && steps.check_app.outputs.app_exists == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          MSG="Tests FALLARON en PR #${{ github.event.pull_request.number }}"
          python -m scripts.telegram_notify "$MSG" || true

      - name: Enable auto-merge to test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --auto --squash --delete-branch=false
          gh pr edit "${{ github.event.pull_request.number }}" --add-label "tests-passed" --remove-label "tests-failed" || true

  promote-to-main:
    name: Promote test → main
    needs: test-and-merge
    runs-on: ubuntu-latest
    steps:
      - name: Wait for merge to test
        run: |
          echo "Esperando a que el PR se mergee a test..."
          for i in {1..30}; do
            STATE=$(gh pr view "${{ github.event.pull_request.number }}" --json state -q '.state' 2>/dev/null || echo "UNKNOWN")
            if [ "$STATE" = "MERGED" ]; then
              echo "PR mergeado."
              break
            fi
            echo "Intento $i/30 - estado: $STATE"
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create promotion PR (test → main)
        id: create_promotion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head test --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "promotion_pr=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Ya existe un PR de promoción: #$EXISTING"
          else
            NEW_PR=$(gh pr create \
              --base main \
              --head test \
              --title "Promote to main: PR #${{ github.event.pull_request.number }}" \
              --body "Auto-promoción disparada por el security pipeline. PR original: #${{ github.event.pull_request.number }}" \
              --label "auto-promote")
            echo "promotion_pr=$NEW_PR" >> "$GITHUB_OUTPUT"
            echo "PR de promoción creado: $NEW_PR"
          fi

      - name: Auto-merge promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(echo "${{ steps.create_promotion.outputs.promotion_pr }}" | grep -oE '[0-9]+$')
          gh pr merge "$PR_NUM" --auto --squash || echo "auto-merge-skip"

      - name: Notify Telegram - promotion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install --quiet requests
          MSG="Promoción a main iniciada desde PR #${{ github.event.pull_request.number }} (PR promoción: ${{ steps.create_promotion.outputs.promotion_pr }})"
          python -m scripts.telegram_notify "$MSG" || true
